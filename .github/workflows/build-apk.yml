name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            package-lock.json
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        run: npm install

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Delete .expo directory
        run: rm -rf .expo

      - name: Create .env file with environment variables
        run: |
          echo "EXPO_PUBLIC_BAIDU_API_KEY=2X4R2K4qq9u3K9769BOjDXtq" > .env
          echo "EXPO_PUBLIC_BAIDU_SECRET_KEY=oHTvqHAZvXUyAMBTrF8n93GnoE41lqri" >> .env
          echo "EXPO_PUBLIC_ZHIPU_API_KEY=1cca44e3c1124a999d501621e9fe8305.xf2xNXly5CkSBe5p" >> .env
          echo "EXPO_PUBLIC_SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_ALIBABA_API_KEY=${{ secrets.ALIBABA_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_DOUBAO_API_KEY=${{ secrets.DOUBAO_API_KEY }}" >> .env

      - name: Prebuild Android (only if android directory missing)
        run: |
          if [ ! -d "android" ]; then
            npx expo prebuild --platform android
          else
            echo "Android directory already exists, skipping prebuild"
          fi

      - name: Clear CMake cache (fixes multi-arch build conflicts)
        run: |
          find node_modules -type d -name ".cxx" -exec rm -rf {} + 2>/dev/null || true
          rm -rf android/app/.cxx

      - name: Build APK (only arm64-v8a for faster build)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease -PreactNativeArchitectures=arm64-v8a

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v5.13
          path: android/app/build/outputs/apk/release/*.apk
